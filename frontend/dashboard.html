<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard — Oniromancer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Spectral:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{background:#07060f;color:#cfc8e8;font-family:'Spectral',Georgia,serif;min-height:100vh;}
:root{--acc:#8b6fd4;--gold:#c09040;--surf:#0d0b1a;--raised:#131024;--bdr:rgba(155,130,230,.1);--bdr-hi:rgba(155,130,230,.22);--sub:#6a6082;--ghost:#28223c;--font-mono:'Space Mono',monospace;--font-title:'IM Fell English',serif;}
[data-theme="light"]{--bg:#f4f0e8;--surf:#eae5da;--raised:#dfd9cc;--bdr:rgba(100,80,50,.11);--bdr-hi:rgba(100,80,50,.24);--txt:#2a2016;--sub:#8a7860;--ghost:#c0b49c;--acc:#7a5cb8;--gold:#a07030;}
body{background:var(--bg,#07060f);}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;background:none;border:none;font-family:inherit;}
/* TOP NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:rgba(13,11,26,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:var(--font-title);font-style:italic;font-size:1.05rem;color:#cfc8e8;display:flex;align-items:center;gap:9px;}
.nl-moon{color:var(--acc);font-size:1.3rem;}
.nav-right{display:flex;gap:8px;align-items:center;}
.nbtn{padding:7px 16px;border-radius:8px;font-family:var(--font-mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;}
.nbtn-ghost{border:1px solid var(--bdr-hi);color:var(--sub);}
.nbtn-ghost:hover{border-color:var(--acc);color:#cfc8e8;}
.nbtn-solid{background:linear-gradient(135deg,var(--acc),#6040b0);color:white;}
.theme-btn{width:28px;height:28px;border-radius:50%;background:var(--raised);border:1px solid var(--bdr-hi);color:var(--sub);font-size:.8rem;display:flex;align-items:center;justify-content:center;}
.theme-btn:hover{color:#cfc8e8;}
/* MAIN LAYOUT */
.dash{max-width:1200px;margin:0 auto;padding:32px 24px 60px;}
/* PAGE HEADER */
.dash-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
.dash-title{font-family:var(--font-title);font-style:italic;font-size:2rem;color:#cfc8e8;line-height:1.2;}
.dash-sub{font-size:.88rem;font-style:italic;color:var(--sub);margin-top:4px;}
.dash-actions{display:flex;gap:8px;flex-wrap:wrap;}
.act-btn{padding:9px 18px;border-radius:9px;font-family:var(--font-mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;display:flex;align-items:center;gap:7px;}
.act-report{background:rgba(192,144,64,.14);border:1px solid rgba(192,144,64,.3);color:var(--gold);}
.act-report:hover{background:rgba(192,144,64,.24);}
.act-new{background:rgba(139,111,212,.14);border:1px solid rgba(139,111,212,.3);color:var(--acc);}
.act-new:hover{background:rgba(139,111,212,.24);}
/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:18px 20px;transition:border-color .2s;}
.stat-card:hover{border-color:var(--bdr-hi);}
.stat-val{font-family:var(--font-title);font-size:2.4rem;color:#cfc8e8;line-height:1;}
.stat-lbl{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);margin-top:5px;}
.stat-sub{font-size:.78rem;font-style:italic;color:var(--ghost,#28223c);margin-top:3px;}
/* LUNAR CARD */
.lunar-card{background:linear-gradient(135deg,rgba(139,111,212,.12),rgba(80,40,120,.08));border:1px solid rgba(139,111,212,.2);border-radius:12px;padding:18px 22px;display:flex;align-items:center;gap:16px;margin-bottom:28px;}
.lunar-em{font-size:2.4rem;}
.lunar-info .phase{font-family:var(--font-title);font-style:italic;font-size:1.2rem;color:#cfc8e8;}
.lunar-info .pct{font-family:var(--font-mono);font-size:.65rem;color:var(--sub);margin-top:2px;letter-spacing:.1em;}
.lunar-info .meaning{font-size:.85rem;font-style:italic;color:var(--sub);margin-top:6px;line-height:1.6;max-width:560px;}
/* GRID */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:28px;}
.chart-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:22px 20px;}
.chart-title{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--acc);margin-bottom:16px;}
canvas{max-height:220px;}
/* SYMBOL CLOUD */
.sym-cloud{display:flex;flex-wrap:wrap;gap:8px;padding-top:4px;}
.sym-pill{padding:5px 13px;border-radius:20px;font-size:.8rem;font-family:var(--font-mono);border:1px solid;transition:all .2s;cursor:default;}
.sym-pill:hover{transform:scale(1.06);}
/* TIMELINE */
.timeline-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:22px 20px;margin-bottom:28px;}
/* ARCHETYPE */
.archetype-card{background:linear-gradient(135deg,rgba(192,144,64,.1),rgba(140,80,40,.06));border:1px solid rgba(192,144,64,.2);border-radius:12px;padding:24px;margin-bottom:28px;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;}
.arch-glyph{font-size:2.8rem;flex-shrink:0;}
.arch-body{}
.arch-label{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.arch-title{font-family:var(--font-title);font-style:italic;font-size:1.4rem;color:#cfc8e8;margin-bottom:8px;}
.arch-desc{font-size:.9rem;font-style:italic;color:var(--sub);line-height:1.7;max-width:560px;}
/* EMPTY STATE */
.empty-dash{text-align:center;padding:80px 20px;}
.empty-g{font-size:3rem;color:var(--ghost);margin-bottom:16px;}
.empty-h{font-family:var(--font-title);font-style:italic;font-size:1.5rem;color:var(--sub);margin-bottom:10px;}
.empty-p{font-size:.9rem;font-style:italic;color:var(--ghost);}
/* REPORT LOADING */
.report-loading{display:none;position:fixed;inset:0;z-index:200;background:rgba(7,6,15,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.report-loading.show{display:flex;}
.report-spin{font-size:2.5rem;animation:spin 2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.report-msg{font-family:var(--font-mono);font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sub);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--bdr-hi);border-radius:2px;}
@media(max-width:600px){.dash{padding:20px 14px 40px;}.dash-title{font-size:1.5rem;}.stat-val{font-size:1.8rem;}}
</style>
</head>
<body>

<div class="report-loading" id="report-loading">
  <div class="report-spin">☽</div>
  <div class="report-msg">Generating your unconscious report…</div>
</div>

<nav>
  <a href="/" class="nav-logo"><span class="nl-moon">☽</span>Oniromancer</a>
  <div class="nav-right">
    <a href="/app" class="nbtn nbtn-solid">Dream Session</a>
    <button class="theme-btn" id="theme-btn">☀</button>
  </div>
</nav>

<div class="dash">
  <div class="dash-header">
    <div>
      <h1 class="dash-title">Unconscious Dashboard</h1>
      <div class="dash-sub">Your dream landscape, made visible.</div>
    </div>
    <div class="dash-actions">
      <button class="act-btn act-report" id="btn-report">⬇ Download PDF Report</button>
      <a href="/app" class="act-btn act-new">+ New Dream</a>
    </div>
  </div>

  <div id="dash-content">
    <div class="empty-dash">
      <div class="empty-g">☽</div>
      <h2 class="empty-h">No dreams recorded yet.</h2>
      <p class="empty-p">Begin a session and your dashboard will come to life.</p>
    </div>
  </div>
</div>

<script>
const API = '/api';

// Theme
const root = document.documentElement;
const tBtn = document.getElementById('theme-btn');
function applyTheme(t){root.dataset.theme=t;tBtn.textContent=t==='dark'?'☀':'☾';try{localStorage.setItem('oni-theme',t);}catch{}}
tBtn.addEventListener('click',()=>applyTheme(root.dataset.theme==='dark'?'light':'dark'));
try{const s=localStorage.getItem('oni-theme');if(s)applyTheme(s);}catch{}

const isDark = () => root.dataset.theme === 'dark';

const EMOTION_COLORS = {
  dread:'#c04060',longing:'#6080d0',confusion:'#909030',revelation:'#40b080',
  grief:'#808090',ecstasy:'#d060c0',rage:'#c05030',tenderness:'#c07080',void:'#504060'
};
const TYPE_COLORS = {
  prophetic:'#8b6fd4',compensatory:'#40b080',trauma:'#c04060','wish-fulfilment':'#6080d0',
  shadow:'#909090',liminal:'#c09040',mundane:'#6a6082'
};
const ARCHETYPE_MAP = {
  shadow:{glyph:'🌑',title:'The Shadow',desc:'The unconscious carries unintegrated aspects of the self — what has been denied, suppressed, or not yet faced. This is a period of confrontation with inner darkness.'},
  prophetic:{glyph:'🔮',title:'The Seer',desc:'Dreams of a prophetic nature suggest heightened intuitive awareness. The psyche is processing signals from deep pattern recognition, pointing toward possibilities not yet consciously acknowledged.'},
  compensatory:{glyph:'⚖️',title:'The Balancer',desc:'The unconscious is working to correct an imbalance in waking life — compensating for something over-emphasised or neglected. Listen for what the psyche is trying to restore.'},
  trauma:{glyph:'🌊',title:'The Wounded',desc:'Processing deep emotional material. The dream-mind is working to metabolise difficult experiences, seeking pathways toward integration and eventual resolution.'},
  'wish-fulfilment':{glyph:'✨',title:'The Dreamer',desc:'Beneath the surface images lies deep longing — desires not yet expressed or acknowledged in waking life. The psyche is rehearsing possibilities.'},
  liminal:{glyph:'🌅',title:'The Threshold Keeper',desc:'Standing between states of being. A profound transition is underway — between identities, relationships, or phases of life. The unconscious is preparing for crossing.'},
};

// Chart.js defaults for dark/light
function chartDefaults(){
  const dark = isDark();
  Chart.defaults.color = dark ? '#6a6082' : '#8a7860';
  Chart.defaults.borderColor = dark ? 'rgba(155,130,230,.1)' : 'rgba(100,80,50,.1)';
}

let charts = {};

function destroyCharts(){
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

async function loadDashboard(){
  try {
    const [dashRes, lunarRes] = await Promise.all([
      fetch(`${API}/dashboard`),
      fetch(`${API}/lunar`)
    ]);
    const data  = await dashRes.json();
    const lunar = await lunarRes.json();
    renderDashboard(data, lunar);
  } catch(e) {
    document.getElementById('dash-content').innerHTML =
      `<div class="empty-dash"><div class="empty-g">⚠</div><h2 class="empty-h">Cannot connect to server.</h2><p class="empty-p">Make sure Oniromancer is running on port 8000.</p></div>`;
  }
}

function renderDashboard(data, lunar){
  destroyCharts();
  chartDefaults();
  const el = document.getElementById('dash-content');

  if(data.empty || data.dream_count === 0){
    el.innerHTML = `<div class="empty-dash"><div class="empty-g">☽</div><h2 class="empty-h">No dreams recorded yet.</h2><p class="empty-p">Begin a session and your dashboard will come to life.</p></div>`;
    return;
  }

  const domType  = data.dominant_type  || 'shadow';
  const arch     = ARCHETYPE_MAP[domType] || ARCHETYPE_MAP.shadow;
  const domEmot  = data.dominant_emotion || '';

  el.innerHTML = `
<!-- STATS -->
<div class="stat-row" id="stat-row"></div>

<!-- LUNAR -->
<div class="lunar-card">
  <div class="lunar-em">${lunar.emoji}</div>
  <div class="lunar-info">
    <div class="phase">${lunar.phase}</div>
    <div class="pct">${lunar.illumination_pct}% illuminated · Day ${lunar.age_days} of cycle</div>
    <div class="meaning">${lunar.meaning}</div>
  </div>
</div>

<!-- ARCHETYPE -->
<div class="archetype-card">
  <div class="arch-glyph">${arch.glyph}</div>
  <div class="arch-body">
    <div class="arch-label">Dominant Archetype</div>
    <div class="arch-title">${arch.title}</div>
    <div class="arch-desc">${arch.desc}</div>
  </div>
</div>

<!-- CHARTS -->
<div class="chart-grid">
  <div class="chart-card"><div class="chart-title">Dream Type Distribution</div><canvas id="type-chart"></canvas></div>
  <div class="chart-card"><div class="chart-title">Emotional Signature</div><canvas id="emot-chart"></canvas></div>
  <div class="chart-card"><div class="chart-title">Lunar Phase Correlation</div><canvas id="moon-chart"></canvas></div>
  <div class="chart-card"><div class="chart-title">Dream Intensity Trend</div><canvas id="intensity-chart"></canvas></div>
</div>

<!-- TIMELINE -->
<div class="timeline-card">
  <div class="chart-title">Dream Activity Timeline</div>
  <canvas id="timeline-chart" style="max-height:140px;"></canvas>
</div>

<!-- SYMBOLS -->
<div class="chart-card" style="margin-bottom:28px;">
  <div class="chart-title">Recurring Core Symbols</div>
  <div class="sym-cloud" id="sym-cloud"></div>
</div>
  `;

  // Stat cards
  const statRow = document.getElementById('stat-row');
  const stats = [
    {val: data.dream_count,    lbl:'Dreams Recorded', sub:'total sessions: '+data.session_count},
    {val: data.avg_intensity,  lbl:'Avg Intensity',   sub:'out of 5.0'},
    {val: domType ? domType.charAt(0).toUpperCase()+domType.slice(1) : '—', lbl:'Dream Archetype', sub:'dominant type'},
    {val: domEmot ? domEmot.charAt(0).toUpperCase()+domEmot.slice(1) : '—', lbl:'Core Emotion',    sub:'most frequent'},
    {val: data.dominant_symbol || '—', lbl:'Key Symbol', sub:'most recurring'},
    {val: `${lunar.emoji}`, lbl: lunar.phase, sub:`${lunar.illumination_pct}% lit`},
  ];
  stats.forEach(s => {
    const c = document.createElement('div'); c.className = 'stat-card';
    c.innerHTML = `<div class="stat-val">${s.val}</div><div class="stat-lbl">${s.lbl}</div><div class="stat-sub">${s.sub}</div>`;
    statRow.appendChild(c);
  });

  const GRID_COLOR = isDark() ? 'rgba(155,130,230,.07)' : 'rgba(100,80,50,.07)';

  // Dream types donut
  if(data.dream_types && Object.keys(data.dream_types).length){
    const labels = Object.keys(data.dream_types);
    charts.type = new Chart(document.getElementById('type-chart'), {
      type:'doughnut',
      data:{labels:labels.map(l=>l.charAt(0).toUpperCase()+l.slice(1)),
            datasets:[{data:Object.values(data.dream_types),
              backgroundColor:labels.map(l=>TYPE_COLORS[l]||'#6a6082'),
              borderColor:'transparent',borderWidth:2}]},
      options:{plugins:{legend:{position:'bottom',labels:{padding:14,font:{size:10}}}},cutout:'62%'}
    });
  }

  // Emotions bar
  if(data.emotions && Object.keys(data.emotions).length){
    const elabels = Object.keys(data.emotions);
    charts.emot = new Chart(document.getElementById('emot-chart'), {
      type:'bar',
      data:{labels:elabels.map(l=>l.charAt(0).toUpperCase()+l.slice(1)),
            datasets:[{data:Object.values(data.emotions),
              backgroundColor:elabels.map(l=>(EMOTION_COLORS[l]||'#6a6082')+'cc'),
              borderColor:elabels.map(l=>EMOTION_COLORS[l]||'#6a6082'),
              borderWidth:1,borderRadius:5}]},
      options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:GRID_COLOR}},x:{grid:{display:false}}}}
    });
  }

  // Moon phases polar
  if(data.moon_phases && Object.keys(data.moon_phases).length){
    const mlabels = Object.keys(data.moon_phases);
    const moonEmojis = {'New Moon':'🌑','Waxing Crescent':'🌒','First Quarter':'🌓','Waxing Gibbous':'🌔','Full Moon':'🌕','Waning Gibbous':'🌖','Last Quarter':'🌗','Waning Crescent':'🌘'};
    charts.moon = new Chart(document.getElementById('moon-chart'), {
      type:'polarArea',
      data:{labels:mlabels.map(l=>`${moonEmojis[l]||''} ${l}`),
            datasets:[{data:Object.values(data.moon_phases),
              backgroundColor:mlabels.map((_,i)=>`hsla(${260+i*20},60%,55%,.55)`),
              borderColor:'transparent'}]},
      options:{plugins:{legend:{position:'bottom',labels:{padding:10,font:{size:9}}}}}
    });
  }

  // Emotion timeline (line)
  if(data.emotion_timeline && data.emotion_timeline.length > 1){
    const etl  = data.emotion_timeline;
    const eNames = [...new Set(etl.map(e=>e.emotion))];
    const dates  = [...new Set(etl.map(e=>e.ts))].sort();
    const datasets = eNames.map(ename => ({
      label: ename.charAt(0).toUpperCase()+ename.slice(1),
      data: dates.map(d => etl.filter(e=>e.ts===d&&e.emotion===ename).length),
      borderColor: EMOTION_COLORS[ename]||'#6a6082',
      backgroundColor: (EMOTION_COLORS[ename]||'#6a6082')+'22',
      borderWidth:2, fill:false, tension:.4, pointRadius:3,
    }));
    charts.intensity = new Chart(document.getElementById('intensity-chart'),{
      type:'line',data:{labels:dates,datasets},
      options:{plugins:{legend:{position:'bottom',labels:{padding:10,font:{size:9}}}},scales:{y:{beginAtZero:true,grid:{color:GRID_COLOR}},x:{grid:{display:false}}}}
    });
  } else {
    document.getElementById('intensity-chart').parentElement.style.display='none';
  }

  // Timeline bar
  if(data.timeline && Object.keys(data.timeline).length){
    const days = Object.keys(data.timeline).sort();
    charts.timeline = new Chart(document.getElementById('timeline-chart'),{
      type:'bar',
      data:{labels:days,datasets:[{data:Object.values(days.map(d=>data.timeline[d])),
        backgroundColor:'rgba(139,111,212,.5)',borderColor:'rgba(139,111,212,.9)',borderWidth:1,borderRadius:4}]},
      options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:GRID_COLOR}},x:{grid:{display:false}}}}
    });
  }

  // Symbol cloud
  const symCloud = document.getElementById('sym-cloud');
  const symEntries = Object.entries(data.top_symbols||{});
  if(symEntries.length){
    const maxCount = Math.max(...symEntries.map(([,v])=>v));
    symEntries.forEach(([sym,count])=>{
      const pill = document.createElement('div'); pill.className='sym-pill';
      const ratio = count/maxCount;
      const hue = 260 + Math.floor(ratio*80);
      pill.style.cssText=`border-color:hsl(${hue},50%,55%,.6);color:hsl(${hue},60%,72%);background:hsl(${hue},50%,20%,.3);font-size:${0.72+ratio*0.22}rem;`;
      pill.textContent=`${sym} ×${count}`;
      symCloud.appendChild(pill);
    });
  } else {
    symCloud.textContent = 'No symbols yet.';
  }
}

// PDF Report
document.getElementById('btn-report').addEventListener('click', async () => {
  const overlay = document.getElementById('report-loading');
  overlay.classList.add('show');
  try {
    const res = await fetch(`${API}/report`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_ids:[], lang:'auto'})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.detail||'Failed');}
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=`oniromancer_report_${Date.now()}.pdf`; a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert(`Report generation failed: ${e.message}`);
  } finally {
    overlay.classList.remove('show');
  }
});

// Re-render on theme change
tBtn.addEventListener('click', ()=>{ setTimeout(loadDashboard, 50); });

loadDashboard();
setInterval(loadDashboard, 60000); // refresh every minute
</script>
</body>
</html>
